# Rust code formatting configuration for Tact.
# See https://rust-lang.github.io/rustfmt/ for all options.

# Project-wide settings — match Cargo.toml
edition = "2024"

# Line width — 120 strikes a balance between readability and
# avoiding excessive nesting for long function signatures / generics.
max_width = 120

# Indentation
hard_tabs = false
tab_spaces = 4

# Imports: group by std → external → crate, matching existing style
# (blank lines between groups are preserved automatically).
group_imports = "StdExternalCrate"
imports_granularity = "Crate"
reorder_imports = true
reorder_modules = true

# Trailing comma on multi-line match arms — default on since 2024 edition,
# explicit here for clarity.
match_block_trailing_comma = true

# Conditional formatting
use_field_init_shorthand = true
force_explicit_abi = true

# Comments
format_code_in_doc_comments = true
wrap_comments = false
normalize_comments = false
normalize_doc_attributes = false

# Misc
newline_style = "Auto"
blank_lines_upper_bound = 3
blank_lines_lower_bound = 0
use_small_heuristics = "Max"
