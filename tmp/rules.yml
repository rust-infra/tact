groups:
  - name: tact_alerts
    interval: 15s
    rules:
      - record: job:request_latency_seconds:mean1m
        expr: rate(request_duration_seconds_sum[1m])
              / rate(request_duration_seconds_count[1m])

      - record: job:error_rate_ratio:mean5m
        expr: rate(http_errors_total[5m])
              / rate(http_requests_total[5m])

      - alert: HighErrorRate
        expr: job:error_rate_ratio:mean5m > 0.01
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Error rate above 1%"
